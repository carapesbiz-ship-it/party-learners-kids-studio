<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Experiences | Party Learners Kids Studio</title>
  <!-- This page has moved permanently. GitHub Pages does not support true 301 headers,
       so we use the closest static-hosting equivalent: meta refresh + canonical + JS fallback.
       Search engines treat this combination as a soft redirect to the new URL. -->
  <link rel="canonical" href="https://www.partylearners.ca/experiences.html" />
  <meta http-equiv="refresh" content="0; url=/experiences.html" />
  <meta name="robots" content="noindex, follow" />
  <script>window.location.replace('/experiences.html' + window.location.hash);</script>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; padding: 40px; text-align: center; color: #23123c; }
    a { color: #e83e8c; font-weight: 700; }
  </style>
</head>
<body>
  <p>This page has moved to <a href="/experiences.html">/experiences.html</a>.</p>
  <p>If you are not redirected automatically, please click the link above.</p>
</body>
</html>
